<!DOCTYPE html>
<html>
<head>
<title>Amazon Gift Code 2047</title>

<style>
body {
  text-align: center;
  font-family: Arial, sans-serif;
  margin-top: 120px;
  background-color: white;
  overflow: hidden;
}

.code-box {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  font-size: 18px;
  text-align: center;
}

button {
  padding: 8px 15px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

#message {
  display: none;
  font-size: 20px;
  color: red;
  margin-top: 25px;
}

.heart {
  position: fixed;
  top: -10%;
  color: red;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<div class="code-box">
Amazon Gift Code: 2047
</div>

<h3>Enter 4 Digit PIN</h3>

<input type="password" id="pin" maxlength="4">
<br>
<button onclick="checkPin()">Verify</button>

<p id="message">
na nethu edho tension la paduthuten 😔<br><br>
sorry deivasenju snap la unblock panu 🙏<br>
im really sorry 💔
</p>

<script>
var correctPin = "2047";

function checkPin() {
  var enteredPin = document.getElementById("pin").value;

  if (enteredPin === correctPin) {
    document.getElementById("message").style.display = "block";
    startHearts();
  } else {
    alert("Invalid PIN");
  }
}

function startHearts() {
  for (let i = 0; i < 50; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
  </html>
