<!DOCTYPE html>
<html>
<head>
<title>Secret Message</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  margin-top: 100px;
  background-color: #ffe6f0;
  overflow: hidden;
}

#message {
  display: none;
  font-size: 22px;
  color: red;
  margin-top: 20px;
}

.heart {
  position: fixed;
  color: red;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { top: -10%; }
  100% { top: 100%; }
}
</style>
</head>

<body>

<h2>💖 Enter 4 Digit PIN 💖</h2>

<input type="password" id="pin" maxlength="4">
<button onclick="checkPin()">Unlock</button>

<p id="message">
na nethu edho tension la paduthuten 😔<br><br>
sorry deivasenju snap la unblock panu 🙏<br>
im really sorry 💔
</p>

<script>
var correctPin = "2047";

function checkPin() {
  var enteredPin = document.getElementById("pin").value;

  if (enteredPin === correctPin) {
    document.getElementById("message").style.display = "block";
    startHearts();
  } else {
    alert("Wrong PIN 😢");
  }
}

function startHearts() {
  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
