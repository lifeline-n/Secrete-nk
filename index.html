<!DOCTYPE html>
<html>
<head>
<title>Secret Message</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  margin-top: 100px;
  background-color: #ffe6f0;
}
#message {
  display: none;
  font-size: 24px;
  color: red;
}
</style>
</head>
<body>

<h2>Enter 4 Digit PIN 💖</h2>
<input type="password" id="pin" maxlength="4">
<button onclick="checkPin()">Unlock</button>

<p id="message">💖 I Love You So Much 💖</p>

<script>
function checkPin() {
  var correctPin = "1432";
  var enteredPin = document.getElementById("pin").value;
  
  if (enteredPin === correctPin) {
    document.getElementById("message").style.display = "block";
  } else {
    alert("Wrong PIN 😢");
  }
}
</script>

</body>
</html>
